<!doctype html>
<html lang="az" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>StudentStay Admin Panel</title>
    <link rel="stylesheet" href="assets/styles.css" />
    <style>
      .admin-container { padding: 40px 20px; max-width: 1200px; margin: 0 auto; }
      .admin-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: var(--bg-card); border-radius: var(--r-md); overflow: hidden; box-shadow: var(--shadow-md); }
      .admin-table th, .admin-table td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border); }
      .admin-table th { background: var(--bg-subtle); font-weight: 700; }
      .admin-actions { display: flex; gap: 10px; }
      .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
      .full-width { grid-column: span 2; }
      .modal-form { max-width: 800px; }
      .dashboard-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
      .d-card { background: var(--brand); color: white; padding: 25px; border-radius: var(--r-md); }
      .d-card h3 { margin: 0; font-size: var(--fs-sm); opacity: 0.9; }
      .d-card strong { font-size: var(--fs-2xl); display: block; margin-top: 5px; }
      .tab-nav { display: flex; gap: 20px; margin-bottom: 20px; border-bottom: 2px solid var(--border); }
      .tab-btn { padding: 10px 20px; cursor: pointer; font-weight: 600; border-bottom: 3px solid transparent; transition: all 0.2s; }
      .tab-btn.active { color: var(--brand); border-color: var(--brand); }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="container header-inner">
        <a class="logo" href="index.html">
          <span class="logo-mark">S</span>
          <span class="logo-text">Admin Panel</span>
        </a>
        <nav class="nav">
          <a href="index.html">Sayta qayıt</a>
        </nav>
      </div>
    </header>

    <div class="admin-container">
      <div class="dashboard-cards" id="statsGrid">
        <div class="d-card"><h3>Cəmi Obyekt</h3><strong id="statPlaces">-</strong></div>
        <div class="d-card"><h3>Ümumi Yataq</h3><strong id="statSpots">-</strong></div>
        <div class="d-card"><h3>Boş Yer</h3><strong id="statFree">-</strong></div>
        <div class="d-card"><h3>Gözləyən Müraciət</h3><strong id="statPending">-</strong></div>
      </div>

      <div class="tab-nav">
        <div class="tab-btn active" data-tab="places">Obyektlər</div>
        <div class="tab-btn" data-tab="bookings">Müraciətlər</div>
      </div>

      <div id="tabPlaces">
        <div style="display: flex; justify-content: space-between; align-items: center">
          <h2>Mövcud Obyektlər</h2>
          <button class="btn btn-primary" id="addPlaceBtn">+ Yeni Obyekt</button>
        </div>
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Ad</th>
              <th>Şəhər</th>
              <th>Qiymət</th>
              <th>Doluluq (Q/O)</th>
              <th>Əməliyyatlar</th>
            </tr>
          </thead>
          <tbody id="placesTableBody"></tbody>
        </table>
      </div>

      <div id="tabBookings" style="display: none">
        <h2>Rezervasiya Müraciətləri</h2>
        <table class="admin-table">
          <thead>
            <tr>
              <th>Tarix</th>
              <th>Müştəri</th>
              <th>Obyekt</th>
              <th>Cinsiyyət</th>
              <th>Müddət</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="bookingsTableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Edit/Add Modal -->
    <div id="adminModal" class="modal">
      <div class="modal-overlay" data-close></div>
      <div class="modal-content modal-form">
        <button class="modal-close" data-close>&times;</button>
        <div class="modal-body">
          <h2 id="modalTitle">Obyekt Məlumatları</h2>
          <form id="placeForm" class="form-grid">
            <input type="hidden" name="id">
            <label class="field"><span>Ad</span><input name="name" required></label>
            <label class="field"><span>Şəhər</span>
              <select name="city">
                <option value="baku">Bakı</option>
                <option value="ganja">Gəncə</option>
                <option value="sumgayit">Sumqayıt</option>
              </select>
            </label>
            <label class="field"><span>Tip</span>
              <select name="type">
                <option value="hostel">Yataqxana</option>
                <option value="apartment">Kirayə ev</option>
                <option value="hotel">Hotel</option>
              </select>
            </label>
            <label class="field"><span>Cinsiyyət</span>
              <select name="gender">
                <option value="mixed">Qarışıq</option>
                <option value="female">Yalnız qız</option>
                <option value="male">Yalnız oğlan</option>
              </select>
            </label>
            <label class="field"><span>Aylıq Qiymət (AZN)</span><input type="number" name="price" required></label>
            <label class="field"><span>Cəmi Yataq</span><input type="number" name="total_spots" required></label>
            
            <label class="field"><span>Qalan Qızlar</span><input type="number" name="female_occupied" value="0"></label>
            <label class="field"><span>Boş Qız Yeri</span><input type="number" name="female_free" value="0"></label>
            <label class="field"><span>Qalan Oğlanlar</span><input type="number" name="male_occupied" value="0"></label>
            <label class="field"><span>Boş Oğlan Yeri</span><input type="number" name="male_free" value="0"></label>
            
            <label class="field full-width"><span>Ünvan</span><input name="address" required></label>
            <label class="field full-width"><span>Təsvir</span><textarea name="description" rows="3"></textarea></label>
            
            <div class="full-width" style="display:flex; gap:20px; margin-top:10px">
              <label><input type="checkbox" name="wifi"> Wi-Fi</label>
              <label><input type="checkbox" name="utilities"> Kommunal daxil</label>
            </div>

            <div class="full-width" style="margin-top:20px">
              <button type="submit" class="btn btn-primary">Yadda Saxla</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="assets/admin.js"></script>
  </body>
</html>
