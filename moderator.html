<!doctype html>
<html lang="az">
  <head>
    <meta charset="utf-8" />
    <script>document.documentElement.setAttribute("data-theme", localStorage.getItem("theme") || "light");</script>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>StudentStay — Moderator</title>
    <link rel="stylesheet" href="assets/styles.css?v=20260521-final" />
    <link rel="stylesheet" href="assets/panel.css?v=20260524" />
    <style>
      body { min-height: 100vh; }
      [hidden] { display: none !important; }
      .occ-form { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 14px; }
      .modal { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; }
      .modal[aria-hidden="true"] { display: none; }
      .modal-ov { position: absolute; inset: 0; background: rgba(0,0,0,.45); }
      .modal-box { position: relative; z-index: 1; background: var(--bg-card); border-radius: var(--r-lg); padding: 28px; width: min(460px,92vw); box-shadow: var(--shadow-xl); }
      .modal-close { position: absolute; top: 12px; right: 14px; background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text-muted); }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="container header-inner">
        <a class="logo" href="index.html">
          <span class="logo-mark">S</span>
          <span class="logo-text">Moderator</span>
          <span id="modOrgName" style="font-size:13px;font-weight:500;color:var(--text-muted);margin-left:6px"></span>
        </a>
        <nav class="nav">
          <a href="index.html">Sayta qayıt</a>
          <button class="btn btn-sm" id="modLogout" type="button" hidden>Çıxış</button>
        </nav>
      </div>
    </header>

    <div class="panel-shell">
      <section id="modLogin" class="panel-login">
        <form id="modLoginForm" class="panel-login-card">
          <h1 style="margin:0 0 20px">Moderator giriş</h1>
          <label class="field"><span>İstifadəçi adı</span><input name="username" autocomplete="username" required></label>
          <label class="field"><span>Şifrə</span><input name="password" type="password" autocomplete="current-password" required></label>
          <button class="btn btn-primary btn-lg" type="submit" style="width:100%">Daxil ol</button>
          <p class="note-err" id="modLoginNote" style="margin-top:10px"></p>
        </form>
      </section>

      <div id="modApp" hidden>
        <div class="stat-grid" id="modStats"></div>

        <div class="tab-nav">
          <div class="tab-btn active" data-tab="bookings">Rezervasiyalar</div>
          <div class="tab-btn" data-tab="places">Elanlar</div>
        </div>

        <div id="tabBookings">
          <div class="panel-card-head" style="margin-bottom:12px">
            <h2 style="margin:0">Rezervasiya müraciətləri</h2>
          </div>
          <input class="panel-search" id="srchBookings" placeholder="Axtar...">
          <div class="table-wrap">
            <table class="panel-table">
              <thead><tr><th>Tarix</th><th>Müştəri</th><th>Elan</th><th>Cins</th><th>Müddət</th><th>Status</th><th>Əməliyyat</th></tr></thead>
              <tbody id="bookingsBody"></tbody>
            </table>
          </div>
        </div>

        <div id="tabPlaces" hidden>
          <div class="panel-card-head" style="margin-bottom:12px">
            <h2 style="margin:0">Elanlar</h2>
          </div>
          <input class="panel-search" id="srchPlaces" placeholder="Axtar...">
          <div class="table-wrap">
            <table class="panel-table">
              <thead><tr><th>Ad</th><th>Tip</th><th>Qiymət</th><th>Doluluq (Q/O)</th><th>Əməliyyat</th></tr></thead>
              <tbody id="placesBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div id="occModal" class="modal" aria-hidden="true">
      <div class="modal-ov" onclick="closeOccModal()"></div>
      <div class="modal-box">
        <button class="modal-close" onclick="closeOccModal()">&times;</button>
        <h3 id="occModalTitle" style="margin:0 0 4px"></h3>
        <p style="color:var(--text-muted);font-size:13px;margin:0 0 14px">Yer doluluğunu yenilə</p>
        <form id="occForm" class="occ-form">
          <input type="hidden" name="place_id">
          <label class="field"><span>Qız — Dolu</span><input type="number" name="female_occupied" min="0" value="0"></label>
          <label class="field"><span>Qız — Boş</span><input type="number" name="female_free" min="0" value="0"></label>
          <label class="field"><span>Oğlan — Dolu</span><input type="number" name="male_occupied" min="0" value="0"></label>
          <label class="field"><span>Oğlan — Boş</span><input type="number" name="male_free" min="0" value="0"></label>
          <div style="grid-column:1/-1;display:flex;gap:10px;align-items:center">
            <button class="btn btn-primary" type="submit">Yadda saxla</button>
            <p class="note-err" id="occNote" style="margin:0"></p>
          </div>
        </form>
      </div>
    </div>

    <script src="assets/moderator.js?v=20260524"></script>
  </body>
</html>
